  AuthorizerFunc:
    runtime: python3.11
    handler: functions/authorizer/lambda_authorizer.auth_handler
    name: "${sls:stage}-${self:service}-authoriser"
    package:
      patterns:
        - '!**/**'
        - "functions/authorizer/**"
    layers:
      - !Ref AuthLambdaLayer
    environment:
      CLERK_KEY: ${ssm:/danceengine/${sls:stage}/clerk/public_key}
      SERVICE_BEARER_TOKEN: ${ssm:/danceengine/${sls:stage}/service_tokens/join_api_bearer}
      SERVICE_ALLOWED_ORGS: ${ssm:/danceengine/${sls:stage}/service_tokens/join_api_allowed_orgs}