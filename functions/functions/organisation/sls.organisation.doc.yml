endpoints:
  Organisation:
    GET:
      summary: "Get Organisation Settings"
      description: "Returns the settings for a given organisation."
      tags:
        - Organisation
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
      methodResponses:
        - statusCode: 200
          responseBody:
            description: Returns organisation details.
          responseModels:
            application/json: "OrganisationResponse"
        - statusCode: 404
          responseBody:
            description: Organisation not found.
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"

    GETpublic:
      summary: "Public Get Organisation Settings"
      description: "Public endpoint to get the settings for a given organisation."
      security:
        - {}
      tags:
        - Public
        - Organisation
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
      methodResponses:
        - statusCode: 200
          responseBody:
            description: Returns public organisation details.
          responseModels:
            application/json: "OrganisationResponsePublic"
        - statusCode: 404
          responseBody:
            description: Organisation not found.
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"

    UPDATE:
      summary: "Update Organisation Settings"
      description: "Update settings for a specific organisation by its slug."
      tags:
        - Organisation
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
      requestBody:
        description: "Organisation details"
      requestModels:
        application/json: "UpdateOrganisationRequest"
      methodResponses:
        - statusCode: 201
          responseBody:
            description: The organisation object.
          responseModels:
            application/json: "OrganisationResponse"
        - statusCode: 400
          responseBody:
            description: Invalid input
        - statusCode: 409
          responseBody:
            description: Version conflict.
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"
