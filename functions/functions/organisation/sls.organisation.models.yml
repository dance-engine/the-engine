_OrganisationThemeCommon: &OrganisationThemeCommon
  css_vars:
    type: string
    description: "CSS variables for the organisation theme, used to customise SOLO templates"
  colour_primary:
    type: string
    description: "Primary colour for the organisation theme, used for branding and UI accents"
  colour_secondary:
    type: string
    description: "Secondary colour for the organisation theme, used for supporting accents"
  colour_background:
    type: string
    description: "Background colour for the organisation theme"
  colour_background_alt:
    type: string
    description: "Alternative background colour for the organisation theme"
  colour_surface_light:
    type: string
    description: "Light surface colour for the organisation theme"
  colour_surface_dark:
    type: string
    description: "Dark surface colour for the organisation theme"

_OrganisationCommon: &OrganisationCommon
  status:
    type: string
    enum:
      - "i-am-teapot"
      - "draft"
      - "active"
      - "setup"
      - "suspended"
      - "archived"
    default: "draft"
  ksuid:
    type: string
    description: "ID of the organisation"
  organisation:
    type: string
    description: "Short slug used to represent the org"
  name:
    type: string
    minLength: 2
    description: "The name of the organisation."
  account_id:
    type: string
    description: "The Stripe account ID associated with the organisation"
  banner:
    type: string
    description: "URL to the banner image for the organisation"
  banner_overlay:
    type: string
    description: "URL to the banner overlay image for the organisation"
  logo:
    type: string
    description: "URL to the logo image for the organisation"
  theme:
    $ref: "#/components/schemas/OrganisationThemeObject"
  description:
    type: string
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
  version:
    type: integer
  history:
    type: array
    items:
      type: object
  logo_secondary_url:
    type: string
    description: "Secondary URL to the logo image for the organisation, used for dark mode or alternative themes"
  logo_icon_url:
    type: string
    description: "URL to the icon version of the logo for the organisation, used in places where a smaller or simplified logo is needed"

OrganisationThemeObject:
  name: "OrganisationThemeObject"
  description: "Organisation theme object"
  x-internal-group: "organisation"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        type: object
        properties:
          <<: *OrganisationThemeCommon

OrganisationObject:
  name: "OrganisationObject"
  description: "Organisation object"
  x-internal-group: "organisation"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        type: object
        required: ["name"]
        properties:
          <<: *OrganisationCommon

OrganisationObjectPublic:
  name: "OrganisationObjectPublic"
  description: "Organisation object for public use"
  x-internal-group: "organisation"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        type: object
        required: ["name"]
        properties:
          <<: *OrganisationCommon

OrganisationResponse:
  name: "OrganisationResponse"
  description: "Single organisation response object"
  x-internal-group: "organisation"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        type: object
        properties:
          organisation:
            $ref: "#/components/schemas/OrganisationObject"

OrganisationResponsePublic:
  name: "OrganisationResponsePublic"
  description: "Single public organisation response object"
  x-internal-group: "organisation"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        type: object
        properties:
          organisation:
            $ref: "#/components/schemas/OrganisationObjectPublic"

UpdateOrganisationRequest:
  name: "UpdateOrganisationRequest"
  description: "Request model for updating an organisation"
  x-internal-group: "organisation"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        $schema: "http://json-schema.org/draft-04/schema#"
        type: object
        required: ["organisation"]
        properties:
          organisation:
            $ref: "#/components/schemas/OrganisationObject"
