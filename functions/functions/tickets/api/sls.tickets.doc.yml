endpoints: 
  Tickets:
    ValidateTicketJwt:
      summary: "Validate Ticket JWT"
      description: "Validates a ticket QR JWT and, when valid, returns the associated ticket."
      tags:
        - Tickets
      security:
        - {}
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
        - name: event
          description: Event slug or ID
          schema:
            type: string
        - name: ksuid
          description: Unique ticket ID (KSUID)
          schema:
            type: string            
      requestBody:
        description: "Ticket JWT validation request."
      requestModels:
        application/json: "ValidateTicketJwtRequest"
      methodResponses:
        - statusCode: 200
          responseBody:
            description: Returns whether the JWT is valid and the associated ticket when found.
          responseModels:
            application/json: "ValidateTicketJwtResponse"
        - statusCode: 400
          responseBody:
            description: Invalid input
          responseModels:
            application/json: "ErrorResponse"
        - statusCode: 404
          responseBody:
            description: Ticket not found.
          responseModels:
            application/json: "ErrorResponse"
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"
    UseTicket:
      summary: "Use a Ticket"
      description: "Marks a ticket as used and checked in. This should be used when a ticket is scanned for entry to an event."
      tags:
        - Tickets
      security:
        - {}
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
        - name: event
          description: Event slug or ID
          schema:
            type: string
        - name: ksuid
          description: Unique ticket ID (KSUID)
          schema:
            type: string
      requestBody:
        description: "Ticket admission update request."
      requestModels:
        application/json: "TicketAdmissionRequest"
      methodResponses:
        - statusCode: 200
          responseBody:
            description: Ticket marked as used successfully.
        - statusCode: 400
          responseBody:
            description: Invalid input
          responseModels:
            application/json: "ErrorResponse"
        - statusCode: 404
          responseBody:
            description: Ticket not found.
          responseModels:
            application/json: "ErrorResponse"
        - statusCode: 409
          responseBody:
            description: Ticket could not be marked as used because it is not in a valid state for check-in.
          responseModels:
            application/json: "ErrorResponse"
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"
    UnuseTicket:
      summary: "Unuse a Ticket"
      description: "Marks a ticket as unused and not checked in. This can be used to undo a mistaken scan or check-in."
      tags:
        - Tickets
      security:
        - {}
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
        - name: event
          description: Event slug or ID
          schema:
            type: string
        - name: ksuid
          description: Unique ticket ID (KSUID)
          schema:
            type: string
      requestBody:
        description: "Ticket admission update request."
      requestModels:
        application/json: "TicketAdmissionRequest"
      methodResponses:
        - statusCode: 200
          responseBody:
            description: Ticket marked as unused successfully.
        - statusCode: 400
          responseBody:
            description: Invalid input
          responseModels:
            application/json: "ErrorResponse"
        - statusCode: 404
          responseBody:
            description: Ticket not found.
          responseModels:
            application/json: "ErrorResponse"
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"
    POST:
      summary: "Create a Ticket"
      description: "Requests creation of a ticket for the selected event. The request is queued and processed asynchronously."
      tags:
        - Tickets
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
        - name: event
          description: Event slug or ID
          schema:
            type: string
      requestBody:
        description: "Ticket details"
      requestModels:
        application/json: "CreateTicketRequest"
      methodResponses:
        - statusCode: 202
          responseBody:
            description: Ticket creation requested successfully.
          responseModels:
            application/json: "CreateTicketQueuedResponse"
        - statusCode: 400
          responseBody:
            description: Invalid input
          responseModels:
            application/json: "ErrorResponse"
        - statusCode: 409
          responseBody:
            description: Duplicate or conflicting ticket creation request.
          responseModels:
            application/json: "ErrorResponse"
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"
    GETall:
      summary: "Get All Tickets"
      description: "Returns a list of all tickets for a given organisation and event."
      tags:
        - Tickets
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
        - name: event
          description: Event slug or ID
          schema:
            type: string
      methodResponses:
        - statusCode: 200
          responseBody:
            description: Returns a list of all tickets.
          responseModels:
            application/json: "TicketListResponse"            
        - statusCode: 404
          responseBody:
            description: No tickets found.
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"
    GETone:
      summary: "Get Single Ticket"
      description: "Fetch details of a specific ticket by its KSUID."
      tags:
        - Tickets
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
        - name: event
          description: Event slug or ID
          schema:
            type: string
        - name: ksuid
          description: Unique ticket ID (KSUID)
          schema:
            type: string
      methodResponses:
        - statusCode: 200
          responseBody:
            description: Returns a list containing the ticket.
          responseModels:
            application/json: "TicketListResponse"
        - statusCode: 404
          responseBody:
            description: Ticket not found
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"
    Send:
      summary: "Send Tickets"
      description: "Sends tickets emails for tickets that already exist."
      tags:
        - Email
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
        - name: event
          description: Event slug or ID
          schema:
            type: string
      requestBody:
        description: "List of Ticket ksuids"
      requestModels:
        application/json: "SendTicketEmailRequest"
      methodResponses:
        - statusCode: 201
          responseBody:
            description: Ticket send requested successfully.
        - statusCode: 400
          responseBody:
            description: Invalid input
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"
    Import:
      summary: "Import Tickets"
      description: "Requests bulk creation of tickets for an event. Set preview=true to validate the event, the referenced line items and likely duplicate tickets, and return the tickets that would be created without creating them."
      tags:
        - Tickets
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
        - name: event
          description: Event slug or ID
          schema:
            type: string
      requestBody:
        description: "Bulk ticket import request. Set preview=true to preview with validation, conflict and duplicate information without creating tickets."
      requestModels:
        application/json: "BulkImportTicketsRequest"
      methodResponses:
        - statusCode: 200
          responseBody:
            description: Preview of tickets that would be created, including validation results and duplicate checks.
        - statusCode: 201
          responseBody:
            description: Ticket import requested successfully.
        - statusCode: 400
          responseBody:
            description: Invalid input
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"
    PUT:
      summary: "Update a Ticket"
      description: "Update an existing Ticket and its location"
      tags:
        - Tickets
      pathParams:
        - name: organisation
          description: Organisation slug
          schema:
            type: string
        - name: event
          description: Event slug or ID
          schema:
            type: string
        - name: ksuid
          description: Unique ticket ID (KSUID)
          schema:
            type: string
      requestBody:   
        description: "Ticket details"
      requestModels:
        application/json: "UpdateTicketRequest"
      methodResponses:
        - statusCode: 201
          responseBody:
            description: Ticket updated successfully.
        - statusCode: 400
          responseBody:
            description: Invalid input
        - statusCode: 409
          responseBody:
            description: Version conflict.
        - statusCode: 500
          responseBody:
            description: Internal server error.
          responseModels:
            application/json: "ErrorResponse"          
