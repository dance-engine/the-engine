TicketObject:
  name: "TicketObject"
  description: "Model representing a ticket object"
  x-internal-group: "tickets"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        type: object
        properties:
          ksuid:
            type: string
            description: "Unique identifier for the ticket"
          name:
            type: string
            description: "Name of the ticket"
          name_on_ticket:
            type: string
            description: "Name to be printed on the ticket"
          customer_email:
            type: string
            description: "Email of the customer who owns the ticket"
          created_at:
            type: string
            format: date-time
            description: "Timestamp when the ticket was created"
          updated_at:
            type: string
            format: date-time
            description: "Timestamp when the ticket was last updated"
          includes:
            type: array
            items:
              type: string
            description: "List of items included with the ticket"
          expanded_includes:
            type: array
            items:
              type: object
            description: "List of the items included with the ticket"
          ticket_status:
            type: string
            enum:
              - "active"
              - "void"
              - "used"
            description: "Status of the ticket"
          financial_status:
            type: string
            enum:
              - "paid"
              - "unpaid"
              - "partially_refunded"
              - "refunded"
              - "comp"
            description: "Financial status of the ticket"
          admission_status:
            type: string
            enum:
              - "checked_in"
              - "not_checked_in"
              - "denied"
            default: "not_checked_in"
            description: "Admission status of the ticket"
          qr_token:
            type: string
            description: "QR token for the ticket"
          checked_in_at:
            type: string
            format: date-time
            description: "Timestamp when the ticket was checked in"
          checked_in_by:
            type: string
            description: "Identifier of the user who checked in the ticket"
          check_in_count:
            type: integer
            description: "Number of times the ticket has been checked in"         
TicketListResponse:
  name: "TicketListResponse"
  description: "Response model for a list of tickets"
  x-internal-group: "tickets"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        type: object
        properties:
          tickets:
            type: array
            items:
              $ref: "#/components/schemas/TicketObject"
SendTicketEmailRequest:
  name: "SendTicketEmailRequest"
  description: "Request model for sending tickets"
  x-internal-group: "tickets"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        $schema: "http://json-schema.org/draft-04/schema#"
        type: object
        required: ["tickets"]
        properties:
          tickets:
            type: array
            items:
              type: string
BulkImportTicketsRequest:
  name: "BulkImportTicketsRequest"
  description: "Request model for bulk importing tickets"
  x-internal-group: "tickets"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        $schema: "http://json-schema.org/draft-04/schema#"
        type: object
        required: ["tickets"]
        properties:
          preview:
            type: boolean
            description: "When true, return the tickets that would be created together with validation, conflict and duplicate information."
          parent_event_ksuid:
            type: string
            description: "KSUID of the parent event for which the tickets are being imported. This is required if the event has variations."
          tickets:
            type: array
            items:
              type: object
              required: ["customer_email", "name_on_ticket", "line_items"]
              properties:
                customer_email:
                  type: string
                name_on_ticket:
                  type: string
                ticket_creation_key:
                  type: string
                line_items:
                  type: array
                  items:
                    type: object
                    required: ["ksuid", "entity_type", "name"]
                    properties:
                      ksuid:
                        type: string
                      entity_type:
                        type: string
                      name:
                        type: string
                      includes:
                        type: array
                        items:
                          type: string
UpdateTicketRequest:          
  name: "UpdateTicketRequest"
  description: "Request model for updating a ticket"
  x-internal-group: "tickets"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        $schema: "http://json-schema.org/draft-04/schema#"
        type: object
        required: ["ticket"]
        properties:
          ticket:
            $ref: "#/components/schemas/TicketObject"
ValidateTicketJwtRequest:
  name: "ValidateTicketJwtRequest"
  description: "Request model for validating a ticket JWT"
  x-internal-group: "tickets"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        $schema: "http://json-schema.org/draft-04/schema#"
        type: object
        required: ["jwt"]
        properties:
          jwt:
            type: string
            description: "JWT minted for the ticket QR code."
ValidateTicketJwtResponse:
  name: "ValidateTicketJwtResponse"
  description: "Response model for ticket JWT validation"
  x-internal-group: "tickets"
  x-internal-path: "_pydantic/models"
  content:
    application/json:
      schema:
        type: object
        required: ["valid"]
        properties:
          valid:
            type: boolean
            description: "Whether the provided ticket JWT is valid."
          ticket:
            $ref: "#/components/schemas/TicketObject"
