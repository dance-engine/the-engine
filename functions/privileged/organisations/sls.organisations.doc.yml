Organisations:
  GET:
    summary: "GET organisations"
    description: "Handle GET requests for /organisations"
    tags:
      - Organisations
    methodResponses:
      - statusCode: 200
        responseBody:
          description: Success
        responseModels:
          application/json: "OrganisationsListResponse"
      - statusCode: 405
        responseBody:
          description: Method Not Allowed
      - statusCode: 500
        responseBody:
          description: Internal Server Error
  POST:
    summary: "POST organisations"
    description: "Handle POST requests for /organisations"
    tags:
      - Organisations
    requestBody:
      description: "Description of the request body"
    requestModels:
      application/json: "CreateOrganisationRequest"
    methodResponses:
      - statusCode: 200
        responseBody:
          description: Success
      - statusCode: 405
        responseBody:
          description: Method Not Allowed
      - statusCode: 500
        responseBody:
          description: Internal Server Error
  GETpub:
    summary: "Public Get Organisations"
    description: "Public endpoint to get all organisations."
    security:
      - {}
    tags:
      - Public
      - Organisations
    methodResponses:
      - statusCode: 200
        responseBody:
          description: The organisation response object.
        responseModels:
          application/json: "OrganisationsListResponsePublic"
      - statusCode: 404
        responseBody:
          description: Event not found
      - statusCode: 500
        responseBody:
          description: Internal server error.
        responseModels:
          application/json: "ErrorResponse"
  GETstackStatus:
    summary: "Get organisation stack status"
    description: "Returns CloudFormation provisioning or teardown progress for an organisation."
    tags:
      - Organisations
    pathParams:
      - name: organisationId
        description: Organisation slug
        schema:
          type: string
    methodResponses:
      - statusCode: 200
        responseBody:
          description: Current stack status and progress details.
        responseModels:
          application/json: "OrganisationStackStatusResponse"
      - statusCode: 403
        responseBody:
          description: Not authorized to read CloudFormation stack status.
        responseModels:
          application/json: "ErrorResponse"
      - statusCode: 404
        responseBody:
          description: Organisation or stack not found.
        responseModels:
          application/json: "ErrorResponse"
      - statusCode: 500
        responseBody:
          description: Internal server error.
        responseModels:
          application/json: "ErrorResponse"
  POSTdeleteStack:
    summary: "Initiate organisation stack deletion"
    description: "Starts CloudFormation stack deletion for an organisation and marks it offboarding."
    tags:
      - Organisations
    pathParams:
      - name: organisationId
        description: Organisation slug
        schema:
          type: string
    requestBody:
      description: "Deletion confirmations"
    requestModels:
      application/json: "DeleteOrganisationRequest"
    methodResponses:
      - statusCode: 200
        responseBody:
          description: Stack was already deleted or no longer exists.
        responseModels:
          application/json: "DeleteOrganisationResponse"
      - statusCode: 202
        responseBody:
          description: Deletion is in progress.
        responseModels:
          application/json: "DeleteOrganisationResponse"
      - statusCode: 400
        responseBody:
          description: Invalid delete request payload.
        responseModels:
          application/json: "ErrorResponse"
      - statusCode: 403
        responseBody:
          description: Not authorized to delete stack.
        responseModels:
          application/json: "ErrorResponse"
      - statusCode: 404
        responseBody:
          description: Organisation or stack not found.
        responseModels:
          application/json: "ErrorResponse"
      - statusCode: 500
        responseBody:
          description: Internal server error.
        responseModels:
          application/json: "ErrorResponse"