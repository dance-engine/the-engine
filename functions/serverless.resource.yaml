resources:
  Resources:
    EmailDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: "${sls:stage}-${self:service}-email-dlq"
        MessageRetentionPeriod: 1209600
        Tags:
          - Key: DanceEngineVersion
            Value: v2
    EmailQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: "${sls:stage}-${self:service}-email"
        VisibilityTimeout: 120
        MessageRetentionPeriod: 345600
        ReceiveMessageWaitTimeSeconds: 20
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt EmailDLQ.Arn
          maxReceiveCount: 5
        Tags:
          - Key: DanceEngineVersion
            Value: v2  
    FulfillmentDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: "${sls:stage}-${self:service}-fulfillment-dlq"
        MessageRetentionPeriod: 1209600
        Tags:
          - Key: DanceEngineVersion
            Value: v2
    FulfillmentQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: "${sls:stage}-${self:service}-fulfillment"
        VisibilityTimeout: 120
        MessageRetentionPeriod: 345600
        ReceiveMessageWaitTimeSeconds: 20
        RedrivePolicy:
          deadLetterTargetArn: !GetAtt FulfillmentDLQ.Arn
          maxReceiveCount: 5
        Tags:
          - Key: DanceEngineVersion
            Value: v2
    FulfillmentQueuePolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - !Ref FulfillmentQueue
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Sid: AllowEventBridgeToSendFulfillmentMessages
              Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sqs:SendMessage
              Resource: !GetAtt FulfillmentQueue.Arn
              Condition:
                ArnEquals:
                  aws:SourceArn: !GetAtt FulfillmentQueueRule.Arn
    FulfillmentQueueRule:
      Type: AWS::Events::Rule
      Properties:
        Name: "${sls:stage}-${self:service}-fulfillment-rule"
        Description: "Routes ticket fulfillment requests to the fulfillment queue"
        EventPattern:
          source:
            - ${param:default_event_bus_source}
          detail-type:
            - "checkout.completed"
            - "ticket.requested"
        State: ENABLED
        Targets:
          - Arn: !GetAtt FulfillmentQueue.Arn
            Id: FulfillmentQueueTarget
    EmailQueuePolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - !Ref EmailQueue
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Sid: AllowEventBridgeToSendEmailMessages
              Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sqs:SendMessage
              Resource: !GetAtt EmailQueue.Arn
              Condition:
                ArnEquals:
                  aws:SourceArn: !GetAtt TicketCreatedEmailQueueRule.Arn
    TicketCreatedEmailQueueRule:
      Type: AWS::Events::Rule
      Properties:
        Name: "${sls:stage}-${self:service}-ticket-created-email-rule"
        Description: "Routes ticket notification email jobs to the email queue"
        EventPattern:
          source:
            - ${param:default_event_bus_source}
          detail:
            data:
              notifications:
                email_job:
                  job_type:
                    - "send_ticket_email"
        State: ENABLED
        Targets:
          - Arn: !GetAtt EmailQueue.Arn
            Id: EmailQueueTarget
            InputPath: "$.detail.data.notifications.email_job"
    CoreDanceEngineTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Delete
      Properties:
        DeletionProtectionEnabled: ${param:isProd}      
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: ${param:isProd}
        AttributeDefinitions:
          - AttributeName: PK
            AttributeType: S
          - AttributeName: SK
            AttributeType: S
          - AttributeName: gsi1PK
            AttributeType: S
          - AttributeName: gsi1SK
            AttributeType: S
          - AttributeName: gsi2PK
            AttributeType: S
          - AttributeName: gsi2SK
            AttributeType: S
          - AttributeName: entity_type
            AttributeType: S
        KeySchema:
          - AttributeName: PK
            KeyType: HASH
          - AttributeName: SK
            KeyType: RANGE
        BillingMode: PAY_PER_REQUEST
        TableName: ${self:custom.core_table_name}
        GlobalSecondaryIndexes:
          - IndexName: IDXinv
            KeySchema:
              - AttributeName: SK
                KeyType: HASH
              - AttributeName: PK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: gsi1
            KeySchema:
              - AttributeName: gsi1PK
                KeyType: HASH
              - AttributeName: gsi1SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: gsi1inv
            KeySchema:
              - AttributeName: gsi1SK
                KeyType: HASH
              - AttributeName: gsi1PK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: gsi2
            KeySchema:
              - AttributeName: gsi2PK
                KeyType: HASH
              - AttributeName: gsi2SK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: gsi2inv
            KeySchema:
              - AttributeName: gsi2SK
                KeyType: HASH
              - AttributeName: gsi2PK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
          - IndexName: typeIDX
            KeySchema:
              - AttributeName: entity_type
                KeyType: HASH
              - AttributeName: PK
                KeyType: RANGE
            Projection:
              ProjectionType: ALL
        Tags:
          - Key: "STAGE"
            Value: ${sls:stage}
          - Key: DanceEngineVersion
            Value: v2
    S3UploadBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: "${self:custom.upload_bucket}"
        CorsConfiguration:
          CorsRules:
            - AllowedOrigins:
                - "*" # Replace with "https://*.dance-engine.co.uk" for security in prod if we can do wildcards
              AllowedMethods:
                - GET
                - POST
                - PUT
                - HEAD
              AllowedHeaders:
                - "*"
              ExposedHeaders:
                - ETag
              MaxAge: 3000
        Tags:
          - Key: DanceEngineVersion
            Value: v2
    CdnOAC:
      Type: AWS::CloudFront::OriginAccessControl
      Properties:
        OriginAccessControlConfig:
          Name: "${sls:stage}-CdnAccessControl"
          OriginAccessControlOriginType: "s3"
          SigningBehavior: "always"
          SigningProtocol: "sigv4"
    CdnDistribution:
      Type: AWS::CloudFront::Distribution
      Properties:
        DistributionConfig:
          Enabled: true
          DefaultRootObject: index.html
          Origins:
            - Id: S3Origin
              DomainName:
                Fn::GetAtt: [S3UploadBucket, RegionalDomainName]
              OriginAccessControlId:
                Ref: CdnOAC
              OriginPath: "/cdn"
              S3OriginConfig: {}  # Required even if OAC is used
          DefaultCacheBehavior:
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods: [GET, HEAD]
            CachedMethods: [GET, HEAD]
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
          ViewerCertificate:
            CloudFrontDefaultCertificate: true
    BucketPolicy:
      Type: AWS::S3::BucketPolicy
      Properties:
        Bucket: !Ref S3UploadBucket
        PolicyDocument:
          Statement:
            - Sid: AllowCloudFrontToAccessCDNPrefix
              Effect: Allow
              Principal:
                Service: cloudfront.amazonaws.com
              Action: s3:GetObject
              Resource: !Sub "${S3UploadBucket.Arn}/cdn/*"
              Condition:
                StringEquals:
                  AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CdnDistribution}"
    ConfigBucket:
      Type: AWS::S3::Bucket
      Properties:
        BucketName: ${self:custom.config_bucket}
        Tags:
          - Key: DanceEngineVersion
            Value: v2
